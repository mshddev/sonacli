name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          version_no_v="${VERSION#v}"
          archive_basename="sonacli_${version_no_v}_${GOOS}_${GOARCH}"
          package_dir="dist/${archive_basename}"

          mkdir -p "$package_dir"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build \
              -trimpath \
              -ldflags "-s -w -X github.com/mshddev/sonacli/internal/cli.Version=${VERSION}" \
              -o "${package_dir}/sonacli" \
              .

          cp README.md LICENSE "$package_dir"/

          tar -C dist -czf "dist/${archive_basename}.tar.gz" "${archive_basename}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          set -euo pipefail
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_args=()
          if [[ "$VERSION" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$VERSION" \
              --verify-tag \
              --generate-notes \
              "${prerelease_args[@]}" \
              dist/*.tar.gz \
              dist/checksums.txt
          fi
